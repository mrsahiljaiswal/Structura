[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path additions so `app.*` is importable from env.py
prepend_sys_path = .

# Timezone for migration file timestamps
timezone = UTC

# Max length of the "slug" portion of generated filenames
truncate_slug_length = 40

# Do not autogenerate against a database that's not the one you expect;
# `revision --autogenerate` compares this to app.db.base.Base.metadata.
# The actual URL is injected at runtime in env.py from app.core.config,
# so secrets never live in this file.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
