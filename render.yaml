services:
  - type: web
    name: structura-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: structura-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: "production"

databases:
  - name: structura-db
    plan: free
    postgresMajorVersion: "15"
